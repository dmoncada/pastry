# PR checks: tests + `tofu plan`. Apply happens only on merge to main (see deploy.yml).
name: ci

on:
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check api cli shared
      - run: uv run pytest

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - working-directory: web
        run: npm ci && npm run lint && npm run build && npm test -- --run

  tofu-plan:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC to assume the AWS role — no long-lived secrets
      contents: read
    env:
      TF_VAR_jwt_signing_key: ${{ secrets.PASTRY_JWT_SIGNING_KEY }}
      TF_VAR_github_oauth_client_id: ${{ vars.GH_OAUTH_CLIENT_ID }}
      TF_VAR_github_oauth_client_secret: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
      TF_VAR_github_repo: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Package Lambda (plan hashes the artifact)
        run: bash scripts/build-lambda.sh
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: opentofu/setup-opentofu@v1
      - name: tofu init
        run: |
          tofu -chdir=infra init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=pastry/main.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_STATE_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
      - run: tofu -chdir=infra plan -no-color
