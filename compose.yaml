name: pastry

services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory", "-sharedDb"]
    ports:
      - "8000:8000"

  dynamodb-init:
    build:
      context: .
      dockerfile: api/Dockerfile.dev
    depends_on:
      - dynamodb
    environment:
      PASTRY_TABLE_NAME: pastry
      PASTRY_DDB_ENDPOINT: http://dynamodb:8000
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-west-2
    command: ["python", "-m", "pastry_api.scripts.create_table"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: api/Dockerfile.dev
    depends_on:
      dynamodb:
        condition: service_started
      dynamodb-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    volumes:
      - ./api:/app/api
      - ./shared:/app/shared
    environment:
      PASTRY_TABLE_NAME: pastry
      PASTRY_DDB_ENDPOINT: http://dynamodb:8000
      PASTRY_AUTH_MODE: ${PASTRY_AUTH_MODE:-dev}
      PASTRY_JWT_SIGNING_KEY: ${PASTRY_JWT_SIGNING_KEY:-dev-insecure-key}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-west-2
    command:
      [
        "uvicorn",
        "pastry_api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
        "--reload",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/healthz')",
        ]
      interval: 3s
      timeout: 2s
      retries: 10

  web:
    image: node:24-alpine
    working_dir: /app
    depends_on:
      - api
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://api:8080
    volumes:
      - ./web:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
