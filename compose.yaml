# Local development stack: dynamodb-local + backend API + web dev server.
# Usage: docker compose up
name: pastry

services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory", "-sharedDb"]
    ports:
      - "8000:8000"

  # One-shot: create the single table + GSI1 against dynamodb-local.
  dynamodb-init:
    build:
      context: .
      dockerfile: api/Dockerfile.dev
    depends_on:
      - dynamodb
    environment:
      PASTRY_DDB_ENDPOINT: http://dynamodb:8000
      PASTRY_TABLE_NAME: pastry
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    command: ["python", "-m", "pastry_api.scripts.create_table"]
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: api/Dockerfile.dev
    depends_on:
      dynamodb:
        condition: service_started
      # Wait for the table to be created before serving, so no transient 404/500s.
      dynamodb-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      PASTRY_DDB_ENDPOINT: http://dynamodb:8000
      PASTRY_TABLE_NAME: pastry
      # Defaults to dev (stub user); set these in .env to exercise real GitHub OAuth.
      PASTRY_AUTH_MODE: ${PASTRY_AUTH_MODE:-dev}
      PASTRY_JWT_SIGNING_KEY: ${PASTRY_JWT_SIGNING_KEY:-dev-insecure-key}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    command:
      ["uvicorn", "pastry_api.main:app", "--host", "0.0.0.0", "--port", "8080", "--reload"]

  web:
    image: node:24-alpine
    working_dir: /app
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
    volumes:
      - ./web:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
